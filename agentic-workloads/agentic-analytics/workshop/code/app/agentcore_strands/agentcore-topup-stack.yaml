AWSTemplateFormatVersion: '2010-09-09'
Description: 'AgentCore Top-Up Stack (WORKSHOP) - participant builds the agent layer by uncommenting one fenced section per step, then `make deploy`'

# =============================================================================
#  WORKSHOP TOP-UP STACK — how this file works
# =============================================================================
#  You deploy this ONE stack on top of the pre-provisioned base infrastructure
#  (Aurora, Cognito, Glue, Bedrock KB, EC2 Code Editor). Each workshop step asks
#  you to UNCOMMENT one clearly-fenced block (or flip one value), then redeploy
#  with `make deploy`. Fences look like:
#
#      # --- UNCOMMENT FROM HERE (Step 4: Prebaked SQL toolset) ---
#      # <resource YAML, each line prefixed with "# ">
#      # --- UNCOMMENT TO HERE (Step 4) ---
#
#  To uncomment a fence: delete the leading "# " on every line BETWEEN the two
#  markers (leave the marker lines themselves). The exact result is always shown
#  in the workshop page's "💡 solution" expander, so you can copy it if needed.
#
#  Base values (VPC, secrets, Cognito, Glue DB, KB id) are pulled automatically
#  via Fn::ImportValue from the base stacks' exports — you don't wire any ARNs.
#  This file is KEPT IN SYNC with infrastructure/stacks/agentcore-stack.yaml
#  (the demo "deploy everything" stack): the tool schemas, Cedar statements, the
#  build chain and the guardrail body are identical; the only differences are
#  the import-vs-nested-param inputs, the per-step comment fences, the EnforceRls
#  toggle, and a workshop-simplified GatewayRole. Edit both when changing tools.
# =============================================================================

Parameters:
  EnvironmentName:
    Type: String
    Default: agentic-analytics
    Description: Resource name prefix; MUST match the base stack so Fn::ImportValue names resolve.

  ArtifactsBucket:
    Type: String
    Description: S3 bucket holding the Lambda/agent code zips (from config.env, passed by `make`).

  ArtifactsPrefix:
    Type: String
    Default: ''
    Description: S3 key prefix for the artifacts (from config.env, passed by `make`).

  DataFoundationLambdaKey:
    Type: String
    Default: lambda/datafoundation_lambda.zip

  InterceptorLambdaKey:
    Type: String
    Default: lambdas/gateway_interceptor.zip
    Description: S3 key for the Gateway interceptor Lambda (use hash-versioned key)

  ApiIntegLambdaKey:
    Type: String
    Default: lambdas/api_integration_toolset.zip
    Description: S3 key for the API integration toolset Lambda (use hash-versioned key)

  CustomSqlLambdaKey:
    Type: String
    Default: lambdas/custom_sql_toolset.zip
    Description: S3 key for the custom SQL toolset Lambda (use hash-versioned key)

  PolicyMode:
    Type: String
    Default: LOG_ONLY
    AllowedValues:
      - LOG_ONLY
      - ENFORCE
    Description: Cedar policy enforcement mode. Step 7.1 flips this to ENFORCE via `make deploy POLICY_MODE=ENFORCE`.

  AgentCodeS3Key:
    Type: String
    Default: agent/agent_code.zip
    Description: S3 key for agent code ZIP (unicorn_rental_agent.py + deps)

  Psycopg2LayerArn:
    Type: String
    Default: ''
    Description: ARN of existing psycopg2 Lambda layer (leave empty to create one)

  GatewayName:
    Type: String
    Default: AgenticAnalyticsMCPGateway

# Base infrastructure values are imported from the pre-deployed base stacks'
# exports (see infrastructure/stacks/{aurora,cognito,glue,database-init,bedrock-kb}-stack.yaml).
# Centralized here so the resource bodies below read `!Sub '${ImportedAuroraEndpoint}'`
# style values are resolved via these mappings — but CFN has no "import alias", so we
# import inline at each use site via Fn::ImportValue with the names below:
#   ${EnvironmentName}-AuroraClusterEndpoint   -> Aurora writer endpoint
#   ${EnvironmentName}-DatabaseSecretArn       -> postgres owner secret (RLS bypassed)
#   ${EnvironmentName}-AppDatabaseSecretArn    -> app_user secret (RLS enforced)
#   ${EnvironmentName}-PrivateSubnet1Id / -PrivateSubnet2Id -> Lambda VPC subnets
#   ${EnvironmentName}-LambdaSecurityGroupId   -> Lambda security group
#   ${EnvironmentName}-KnowledgeBaseId         -> Bedrock KB id (custom-SQL RAG)
#   ${EnvironmentName}-GlueDatabaseName        -> Glue catalog db (custom-SQL schema)
#   ${EnvironmentName}-UserPoolId / -UserLoginClientId -> Cognito JWT authorizer

Conditions:
  NeedsPsycopg2Layer: !Equals [!Ref Psycopg2LayerArn, '']

  # ---------------------------------------------------------------------------
  # TODO 7.2 — Row-Level Security switch.
  # The default routes the SQL Lambdas to the 'postgres' owner secret, which
  # OWNS the tables and therefore BYPASSES Row-Level Security. In Step 7.2 you
  # enforce RLS by switching to the 'app_user' secret: COMMENT the first line
  # below and UNCOMMENT the second, then `make deploy`.
  # ---------------------------------------------------------------------------
  EnforceRls: !Equals ['off', 'on']     # default OFF — postgres secret, RLS bypassed
  # EnforceRls: !Equals ['on', 'on']    # Step 7.2 ON — app_user secret, RLS enforced

Resources:

  #============================================================================
  # Gateway Interceptor Lambda
  # Propagates Authorization header from incoming requests to Lambda targets
  # so the targets can extract JWT claims (account_id, role) for RLS.
  #============================================================================
  InterceptorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-gateway-interceptor-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  InterceptorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-gateway-interceptor
      Description: Propagates Authorization header from Gateway to Lambda targets
      Runtime: python3.12
      Handler: interceptor_lambda.lambda_handler
      Role: !GetAtt InterceptorLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: !Sub ${ArtifactsPrefix}${InterceptorLambdaKey}

  InterceptorLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InterceptorLambda
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com

  # NOTE: The optional Cube SemanticLayer toolset is intentionally NOT part of
  # this top-up. The semantic-layer lab keeps its own parallel two-agent
  # comparison (deploy_semantic_layer_stack.py) as a documented script exception.

  #============================================================================
  # Gateway IAM Role
  #============================================================================
  GatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-gateway-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GatewayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # WORKSHOP SIMPLIFICATION: the demo stack lists each toolset Lambda
              # ARN explicitly (!GetAtt ...). Here the toolset Lambdas are added
              # progressively (Steps 4/5/6), so listing them by !GetAtt would make
              # this role reference resources that don't exist yet and fail the
              # template. Instead we scope by the shared name prefix — every
              # toolset Lambda is named ${EnvironmentName}-*, so the Gateway can
              # invoke each one as you uncomment it, with no edit to this role.
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${EnvironmentName}-*
              - Effect: Allow
                Action:
                  - bedrock-agentcore:*
                Resource: '*'

  #============================================================================
  # AgentCore Gateway (native CFN)
  #============================================================================
  Gateway:
    Type: AWS::BedrockAgentCore::Gateway
    DependsOn:
      - GatewayRole
      - InterceptorLambdaPermission
    Properties:
      Name: !Ref GatewayName
      ProtocolType: MCP
      RoleArn: !GetAtt GatewayRole.Arn
      AuthorizerType: CUSTOM_JWT
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl:
            Fn::Sub:
              - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}/.well-known/openid-configuration
              - PoolId:
                  Fn::ImportValue: !Sub '${EnvironmentName}-UserPoolId'
          AllowedClients:
            - Fn::ImportValue: !Sub '${EnvironmentName}-UserLoginClientId'
      # --- Step 7a: ALSO uncomment these 3 lines (the Gateway -> Policy Engine wiring) ---
      # PolicyEngineConfiguration:
      #   Arn: !GetAtt PolicyEngine.PolicyEngineArn
      #   Mode: !Ref PolicyMode
      InterceptorConfigurations:
        - Interceptor:
            Lambda:
              Arn: !GetAtt InterceptorLambda.Arn
          InterceptionPoints:
            - REQUEST
          InputConfiguration:
            PassRequestHeaders: true
      Description: AgentCore Gateway for Agentic Analytics

