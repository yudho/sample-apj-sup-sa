  #============================================================================
  # AgentCore Observability — vended-log + trace delivery
  # Mirrors deploy_observability.py: for each AgentCore resource (Gateway and
  # Memory), creates two pipelines:
  #   1. APPLICATION_LOGS → CloudWatch Logs group (CFN-native)
  #   2. TRACES → X-Ray (custom resource — CFN's AWS::Logs::DeliveryDestination
  #      doesn't accept deliveryDestinationType='XRAY')
  # Account-wide Transaction Search is enabled by ObservabilityStack.
  #============================================================================

  # ---- Gateway: APPLICATION_LOGS to CloudWatch Logs (CFN-native) ----
  GatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/vendedlogs/bedrock-agentcore/gateway/APPLICATION_LOGS/${Gateway.GatewayIdentifier}
      RetentionInDays: 30

  GatewayLogsDeliverySource:
    Type: AWS::Logs::DeliverySource
    DependsOn: Gateway
    Properties:
      Name: !Sub ${EnvironmentName}-gw-logs-src
      LogType: APPLICATION_LOGS
      ResourceArn: !GetAtt Gateway.GatewayArn

  GatewayLogsDeliveryDestination:
    Type: AWS::Logs::DeliveryDestination
    Properties:
      Name: !Sub ${EnvironmentName}-gw-logs-dst
      DestinationResourceArn: !GetAtt GatewayLogGroup.Arn

  GatewayLogsDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref GatewayLogsDeliverySource
      DeliveryDestinationArn: !GetAtt GatewayLogsDeliveryDestination.Arn

  # ---- Memory: APPLICATION_LOGS to CloudWatch Logs (CFN-native) ----
  MemoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/vendedlogs/bedrock-agentcore/memory/APPLICATION_LOGS/${AgentMemory.MemoryId}
      RetentionInDays: 30

  MemoryLogsDeliverySource:
    Type: AWS::Logs::DeliverySource
    DependsOn: AgentMemory
    Properties:
      Name: !Sub ${EnvironmentName}-mem-logs-src
      LogType: APPLICATION_LOGS
      ResourceArn: !GetAtt AgentMemory.MemoryArn

  MemoryLogsDeliveryDestination:
    Type: AWS::Logs::DeliveryDestination
    Properties:
      Name: !Sub ${EnvironmentName}-mem-logs-dst
      DestinationResourceArn: !GetAtt MemoryLogGroup.Arn

  MemoryLogsDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref MemoryLogsDeliverySource
      DeliveryDestinationArn: !GetAtt MemoryLogsDeliveryDestination.Arn

  # ---- TRACES → X-Ray (custom resource for both Gateway and Memory) ----
  TracesSetupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-traces-setup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TracesSetupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Logs delivery management — same surface as logs:DeliveryDestination handler
              - Effect: Allow
                Action:
                  - logs:PutDeliverySource
                  - logs:GetDeliverySource
                  - logs:DeleteDeliverySource
                  - logs:PutDeliveryDestination
                  - logs:GetDeliveryDestination
                  - logs:DeleteDeliveryDestination
                  - logs:PutDeliveryDestinationPolicy
                  - logs:GetDeliveryDestinationPolicy
                  - logs:DeleteDeliveryDestinationPolicy
                  - logs:CreateDelivery
                  - logs:DeleteDelivery
                  - logs:GetDelivery
                  - logs:DescribeDeliveries
                  - logs:DescribeDeliverySources
                  - logs:DescribeDeliveryDestinations
                  - logs:AllowVendedLogDeliveryForResource
                  - logs:TagResource
                  - logs:ListTagsForResource
                Resource: '*'
              # Source-resource permission — required by put_delivery_source for vended logs
              - Effect: Allow
                Action:
                  - bedrock-agentcore:AllowVendedLogDeliveryForResource
                Resource: '*'
              # X-Ray destination permissions (workshop's deploy_observability.py runs
              # as Admin, which has these implicitly; our Lambda needs them explicit)
              - Effect: Allow
                Action:
                  - xray:PutResourcePolicy
                  - xray:GetResourcePolicy
                  - xray:DeleteResourcePolicy
                  - xray:ListResourcePolicies
                  - xray:PutTraceSegments
                  - xray:GetTraceSummaries
                Resource: '*'

  TracesSetupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-traces-setup
      Description: Wires APPLICATION_LOGS/TRACES delivery for AgentCore resources (mirrors deploy_observability.py)
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TracesSetupRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import boto3, json, urllib.request
          def send(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See {context.log_stream_name}',
                  'PhysicalResourceId': event.get('PhysicalResourceId') or event['ResourceProperties'].get('SrcName', 'traces'),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              })
              urllib.request.urlopen(urllib.request.Request(
                  event['ResponseURL'], data=body.encode(),
                  headers={'Content-Type': ''}, method='PUT'))
          def handler(event, context):
              try:
                  props = event['ResourceProperties']
                  src_name = props['SrcName']
                  dst_name = props['DstName']
                  resource_arn = props['ResourceArn']
                  logs = boto3.client('logs')
                  if event['RequestType'] == 'Delete':
                      try:
                          for d in logs.describe_deliveries().get('deliveries', []):
                              if d.get('deliverySourceName') == src_name:
                                  logs.delete_delivery(id=d['id'])
                          logs.delete_delivery_destination(name=dst_name)
                          logs.delete_delivery_source(name=src_name)
                      except Exception as e:
                          print(f'Delete warning: {e}')
                      send(event, context, 'SUCCESS')
                      return
                  # Create / Update — idempotent. Mirrors deploy_observability.py.
                  try:
                      logs.put_delivery_source(name=src_name, logType='TRACES', resourceArn=resource_arn)
                      print(f'put_delivery_source ok: {src_name}')
                  except Exception as e:
                      msg = str(e).lower()
                      if 'conflict' not in msg and 'already exists' not in msg:
                          raise
                      print(f'source exists: {src_name}')
                  try:
                      dst = logs.put_delivery_destination(name=dst_name, deliveryDestinationType='XRAY')
                      dst_arn = dst['deliveryDestination']['arn']
                      print(f'put_delivery_destination ok: {dst_name}')
                  except Exception as e:
                      msg = str(e).lower()
                      if 'conflict' not in msg and 'already exists' not in msg:
                          raise
                      dst = logs.describe_delivery_destinations(name=dst_name)
                      dst_arn = dst['deliveryDestinations'][0]['arn']
                      print(f'destination exists: {dst_name}')
                  # Two-statement vended-log policy as documented by AWS.
                  account_id = context.invoked_function_arn.split(':')[4]
                  policy = json.dumps({
                      'Version': '2012-10-17',
                      'Statement': [
                          {
                              'Sid': 'AllowVendedLogDelivery',
                              'Effect': 'Allow',
                              'Principal': {'Service': 'delivery.logs.amazonaws.com'},
                              'Action': ['logs:CreateDelivery'],
                              'Resource': dst_arn,
                              'Condition': {
                                  'StringEquals': {'aws:SourceAccount': account_id}
                              }
                          },
                          {
                              'Sid': 'AllowAccountDelivery',
                              'Effect': 'Allow',
                              'Principal': {'AWS': f'arn:aws:iam::{account_id}:root'},
                              'Action': [
                                  'logs:CreateDelivery',
                                  'logs:GetDelivery',
                                  'logs:DeleteDelivery'
                              ],
                              'Resource': dst_arn
                          }
                      ]
                  })
                  try:
                      logs.put_delivery_destination_policy(
                          deliveryDestinationName=dst_name,
                          deliveryDestinationPolicy=policy
                      )
                      print('destination policy attached')
                  except Exception as e:
                      print(f'put_delivery_destination_policy warning: {e}')
                  try:
                      logs.create_delivery(deliverySourceName=src_name, deliveryDestinationArn=dst_arn)
                      print(f'create_delivery ok')
                  except Exception as e:
                      msg = str(e).lower()
                      if 'conflict' not in msg and 'already exists' not in msg:
                          raise
                      print(f'delivery exists')
                  send(event, context, 'SUCCESS', {'DestinationArn': dst_arn})
              except Exception as e:
                  print(f'Error: {e}')
                  send(event, context, 'FAILED', reason=str(e)[:200])

  GatewayTracesSetup:
    Type: Custom::TracesSetup
    DependsOn: Gateway
    Properties:
      ServiceToken: !GetAtt TracesSetupFunction.Arn
      SrcName: !Sub ${EnvironmentName}-gw-traces-src
      DstName: !Sub ${EnvironmentName}-gw-traces-dst
      ResourceArn: !GetAtt Gateway.GatewayArn

  MemoryTracesSetup:
    Type: Custom::TracesSetup
    DependsOn: AgentMemory
    Properties:
      ServiceToken: !GetAtt TracesSetupFunction.Arn
      SrcName: !Sub ${EnvironmentName}-mem-traces-src
      DstName: !Sub ${EnvironmentName}-mem-traces-dst
      ResourceArn: !GetAtt AgentMemory.MemoryArn

  #============================================================================
  # AgentCore Memory — short-term conversation history within sessions.
  # The agent reads MEMORY_ID from its environment and uses MemoryHookProvider
  # to load/save events. Mirrors deploy_memory.py (no strategies, 7-day expiry).
  #============================================================================
  AgentMemory:
    Type: AWS::BedrockAgentCore::Memory
    Properties:
      Name: unicorn_rental_agent_memory
      Description: Short-term conversation memory for unicorn rental analytics agent
      EventExpiryDuration: 7

  # ===== UNCOMMENT FROM HERE (Step 8: Bedrock Guardrail) ======
#
#   #============================================================================
#   # Bedrock Guardrail (optional — controlled by EnableGuardrail param)
#   # Wires into the agent at runtime via GUARDRAIL_ID + GUARDRAIL_VERSION env
#   # vars (read by app/agentcore_strands/unicorn_rental_agent.py).
