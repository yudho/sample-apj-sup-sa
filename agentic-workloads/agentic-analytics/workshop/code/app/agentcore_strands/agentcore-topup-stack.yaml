#             Action: BLOCK
#       WordPolicyConfig:
#         ManagedWordListsConfig:
#           - Type: PROFANITY
  # ===== UNCOMMENT TO HERE (Step 8) ======

  #============================================================================
  # AgentCore Runtime IAM Role
  #============================================================================
  AgentRuntimeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-agent-runtime-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AgentRuntimePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:ListSessions
                  - bedrock-agentcore:GetMemoryRecord
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource: !GetAtt AgentMemory.MemoryArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::${ArtifactsBucket}/*
              # Chart code interpreter: the runtime role must be allowed to START
              # and drive sessions on the custom CI (the CI's OWN execution role only
              # governs what the sandbox can do once running — it does NOT grant the
              # agent permission to invoke it). Without this the agent gets
              # AccessDeniedException on StartCodeInterpreterSession and charts fail.
              # Scoped to the chart CI and its sessions (not '*').
              - Effect: Allow
                Action:
                  - bedrock-agentcore:StartCodeInterpreterSession
                  - bedrock-agentcore:InvokeCodeInterpreter
                  - bedrock-agentcore:StopCodeInterpreterSession
                  - bedrock-agentcore:GetCodeInterpreterSession
                  - bedrock-agentcore:ListCodeInterpreterSessions
                Resource:
                  - !GetAtt ChartCodeInterpreter.CodeInterpreterArn
                  - !Sub '${ChartCodeInterpreter.CodeInterpreterArn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !GetAtt AgentECRRepo.Arn

  #============================================================================
  # ECR Repository for Agent Container
  #============================================================================
  AgentECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${EnvironmentName}-agent
      # Let delete-stack remove the repo even though CodeBuild pushed images into it
      # — otherwise teardown fails with "repository still contains images" (mirrors
      # the voice ECR repo in voice-agentcore-stack.yaml).
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: false
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"selection":{"tagStatus":"untagged","countType":"imageCountMoreThan","countNumber":3},"action":{"type":"expire"}}]}'

  #============================================================================
  # CodeBuild Role
  #============================================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt AgentECRRepo.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub arn:aws:s3:::${ArtifactsBucket}/*

  #============================================================================
  # CodeBuild Project — builds agent Docker image
  #============================================================================
  AgentBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${EnvironmentName}-agent-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPO_URI
            Value: !GetAtt AgentECRRepo.RepositoryUri
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: S3
        Location: !Sub ${ArtifactsBucket}/${ArtifactsPrefix}${AgentCodeS3Key}
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - |
                  cat > Dockerfile << 'DOCKERFILE'
                  FROM public.ecr.aws/docker/library/python:3.12-slim
                  WORKDIR /app
                  COPY requirements.txt .
                  RUN pip install --no-cache-dir -r requirements.txt
                  COPY unicorn_rental_agent.py .
                  COPY unicorn_rental_analytics.sop.md .
                  EXPOSE 8080
                  CMD ["python", "unicorn_rental_agent.py"]
                  DOCKERFILE
                - docker build -t $ECR_REPO_URI:latest .
            post_build:
              commands:
                - docker push $ECR_REPO_URI:latest
                - echo $ECR_REPO_URI:latest > /tmp/image_uri.txt
      Artifacts:
        Type: NO_ARTIFACTS
      TimeoutInMinutes: 15

  #============================================================================
  # Custom Resource Lambda — triggers CodeBuild and waits
  #============================================================================
  BuildTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-build-trigger-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BuildTriggerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt AgentBuildProject.Arn

  BuildTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-build-trigger
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BuildTriggerRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request
          def send(event, context, status, data=None, reason=None):
              body = json.dumps({'Status': status, 'Reason': reason or 'OK',
                  'PhysicalResourceId': event.get('PhysicalResourceId', 'build'),
                  'StackId': event['StackId'], 'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'], 'Data': data or {}})
              urllib.request.urlopen(urllib.request.Request(event['ResponseURL'],
                  data=body.encode(), headers={'Content-Type': ''}, method='PUT'))
          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  send(event, context, 'SUCCESS'); return
              try:
                  props = event['ResourceProperties']
                  cb = boto3.client('codebuild')
                  build = cb.start_build(projectName=props['ProjectName'])
                  build_id = build['build']['id']
                  while True:
                      time.sleep(15)
                      r = cb.batch_get_builds(ids=[build_id])
                      status = r['builds'][0]['buildStatus']
                      if status == 'SUCCEEDED':
                          send(event, context, 'SUCCESS', {'ImageUri': props['ImageUri']})
                          return
                      elif status in ('FAILED', 'FAULT', 'STOPPED', 'TIMED_OUT'):
                          send(event, context, 'FAILED', reason=f'Build {status}')
                          return
              except Exception as e:
                  send(event, context, 'FAILED', reason=str(e)[:200])

  BuildTrigger:
    Type: Custom::BuildTrigger
    DependsOn:
      - AgentBuildProject
      - BuildTriggerFunction
      - AgentECRRepo
    Properties:
      ServiceToken: !GetAtt BuildTriggerFunction.Arn
      ProjectName: !Ref AgentBuildProject
      ImageUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EnvironmentName}-agent:latest

  #============================================================================
  # Chart Code Interpreter (custom — renders matplotlib PNGs and uploads to S3)
  #
  # The agent calls this sandbox to render charts; the SOP (Step 4b) has it write
  # the PNG to s3://${ArtifactsBucket}/charts/ and print only the S3 key. A CUSTOM
  # interpreter is required because the default aws.codeinterpreter.v1 has NO
  # execution role and therefore cannot reach S3. The agent then presigns the key
  # for the UI (its runtime role already has s3:GetObject on the bucket).
  #============================================================================
  ChartCodeInterpreterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-chart-ci-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ChartUploadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${ArtifactsBucket}/charts/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  ChartCodeInterpreter:
    Type: AWS::BedrockAgentCore::CodeInterpreterCustom
    Properties:
      # AgentCore names must match [a-zA-Z][a-zA-Z0-9_]{0,47} — no hyphens. Hardcoded
      # with underscores (like AgentRuntimeName above) since ${EnvironmentName}
      # contains a hyphen (agentic-analytics).
      Name: agentic_analytics_chart_ci
      Description: Renders matplotlib charts and uploads them to S3 for the analytics agent
      NetworkConfiguration:
        NetworkMode: PUBLIC   # needs egress to reach S3
      ExecutionRoleArn: !GetAtt ChartCodeInterpreterRole.Arn

  #============================================================================
  # AgentCore Runtime (Container mode — pre-built image, fast cold start)
  #============================================================================
  AgentRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn:
      - AgentRuntimeRole
      - BuildTrigger
      - ChartCodeInterpreter
    Properties:
      AgentRuntimeName: agentic_analytics_agent
      Description: Strands agent for Agentic Analytics demo
      RoleArn: !GetAtt AgentRuntimeRole.Arn
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EnvironmentName}-agent:latest
      NetworkConfiguration:
        NetworkMode: PUBLIC
      # JWT-native inbound auth: callers (SPA + voice bot) present the signed-in
      # user's Cognito ACCESS token as `Authorization: Bearer`. The runtime validates
      # signature/issuer/client_id before invoking the agent — replacing IAM/SigV4.
      # Cognito access tokens carry no 'aud', so we validate on client_id (AllowedClients),
      # matching the Gateway authorizer above. The request-header allowlist passes the
      # Authorization header through so the agent can read claims (context.request_headers).
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl:
            Fn::Sub:
              - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}/.well-known/openid-configuration
              - PoolId:
                  Fn::ImportValue: !Sub '${EnvironmentName}-UserPoolId'
          AllowedClients:
            - Fn::ImportValue: !Sub '${EnvironmentName}-UserLoginClientId'
      RequestHeaderConfiguration:
        RequestHeaderAllowlist:
          - Authorization
      EnvironmentVariables:
        GATEWAY_URL: !GetAtt Gateway.GatewayUrl
        AWS_REGION: !Ref AWS::Region
        BEDROCK_MODEL_ID: global.anthropic.claude-opus-4-8
        BYPASS_TOOL_CONSENT: 'true'
        GUARDRAIL_ID: ''        # Step 8: replace '' with  !Ref Guardrail
        GUARDRAIL_VERSION: ''   # Step 8: replace '' with  'DRAFT'
        MEMORY_ID: !GetAtt AgentMemory.MemoryId
        SOP_S3_BUCKET: !Ref ArtifactsBucket
        # Charts: the agent renders matplotlib PNGs in the custom Code Interpreter
        # below (which can write to S3), then presigns the key for the UI. The agent
        # role already has s3:GetObject on the bucket, so it can presign.
        ENABLE_CHART_TOOL: 'true'
        CHART_CI_ID: !GetAtt ChartCodeInterpreter.CodeInterpreterId
        CHART_BUCKET: !Ref ArtifactsBucket

  #============================================================================
  # AgentCore Runtime Endpoint
  #============================================================================
  AgentRuntimeEndpoint:
    Type: AWS::BedrockAgentCore::RuntimeEndpoint
    DependsOn: AgentRuntime
    Properties:
      AgentRuntimeId: !GetAtt AgentRuntime.AgentRuntimeId
      AgentRuntimeVersion: !GetAtt AgentRuntime.AgentRuntimeVersion
      Name: agentic_analytics_endpoint
      Description: Production endpoint for Agentic Analytics agent

Outputs:
  GatewayId:
    Description: AgentCore Gateway ID
    Value: !GetAtt Gateway.GatewayIdentifier

  GatewayArn:
    Description: AgentCore Gateway ARN
    Value: !GetAtt Gateway.GatewayArn

  GatewayUrl:
    Description: AgentCore Gateway URL
    Value: !GetAtt Gateway.GatewayUrl

  AgentRuntimeId:
    Description: AgentCore Runtime ID
    Value: !GetAtt AgentRuntime.AgentRuntimeId

  AgentRuntimeArn:
    Description: AgentCore Runtime ARN (what the voice bot invokes)
    Value: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentRuntime.AgentRuntimeId}'

  AgentRuntimeEndpointId:
    Description: AgentCore Runtime Endpoint ID
    Value: !GetAtt AgentRuntimeEndpoint.Id

  AgentRuntimeEndpointArn:
    Description: AgentCore Runtime Endpoint ARN
    Value: !GetAtt AgentRuntimeEndpoint.AgentRuntimeEndpointArn
