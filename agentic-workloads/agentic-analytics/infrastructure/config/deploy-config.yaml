# Agentic Analytics - Deployment Configuration
# 
# This file contains customizable settings for the deployment.
# Modify these values before running deploy_all.sh
#

# AWS Region for deployment
# Default: us-west-2 (Sydney)
region: us-west-2

# Stack name prefix
# All CloudFormation stacks will be prefixed with this value
# Default: agentic-analytics
stack_prefix: agentic-analytics

# Aurora PostgreSQL Configuration
aurora:
  # Minimum ACU (Aurora Capacity Units) for serverless scaling
  # Range: 0.5 - 128, Default: 0.5
  min_capacity: 0.5
  
  # Maximum ACU for serverless scaling
  # Range: 0.5 - 128, Default: 4
  max_capacity: 4
  
  # Database name
  database_name: timely_unicorn
  
  # PostgreSQL engine version
  engine_version: "15.4"

# VPC Configuration
vpc:
  # CIDR block for the VPC
  # Default: 10.0.0.0/16
  cidr_block: "10.0.0.0/16"
  
  # Enable NAT Gateway for private subnet internet access
  # Set to false to reduce costs (Lambda won't have internet access)
  enable_nat_gateway: true

# Glue Data Catalog Configuration
glue:
  # Database name in Glue catalog
  database_name: timely_unicorn
  
  # Crawler schedule (cron expression or empty for on-demand)
  # Leave empty for manual/on-demand crawling
  crawler_schedule: ""

# Embeddings Configuration
embeddings:
  # Bedrock model for generating embeddings
  model_id: amazon.titan-embed-text-v2:0
  
  # Embedding dimension (must match model output)
  dimension: 1024

# Agent Configuration
agent:
  # Bedrock model for the agent
  model_id: anthropic.claude-3-sonnet-20240229-v1:0
  
  # Maximum tokens for agent responses
  max_tokens: 4096

# Tags to apply to all resources
tags:
  Project: agentic-analytics
  Environment: demo
  ManagedBy: cloudformation
