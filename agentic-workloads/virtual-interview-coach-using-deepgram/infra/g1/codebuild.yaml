AWSTemplateFormatVersion: "2010-09-09"

# Transient cloud-build stack for G1 Phase C3.
#
# Local Docker on the dev machine was unusable (host disk full -> corrupted Docker Desktop VM),
# so the worker + backend images are built in CodeBuild and pushed to the ECR repos that
# infra/g1/deploy.yaml already created. This stack is disposable: delete it once the images are
# in ECR (the images persist in ECR independently of this stack).
#
# Flow (see build-images.sh): deploy this stack -> upload a source zip to the SourceBucket ->
# start-build -> poll -> delete this stack.
Description: >-
  InterviewCoach G1 transient image-build stack: a CodeBuild project (privileged, Docker) that
  builds the worker + backend images and pushes them to ECR. Delete after the images land.

Parameters:
  WorkerRepoArn:
    Type: String
    Description: ARN of the worker ECR repo (from the demo stack).
  BackendRepoArn:
    Type: String
    Description: ARN of the backend ECR repo (from the demo stack).
  ReportRepoArn:
    Type: String
    Description: ARN of the report-worker ECR repo (from the demo stack, F003).
  WorkerRepoUri:
    Type: String
  BackendRepoUri:
    Type: String
  ReportRepoUri:
    Type: String
  EcrRegistry:
    Type: String
    Description: <account>.dkr.ecr.<region>.amazonaws.com
  ImageTag:
    Type: String
    Default: c1

Resources:
  SourceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub ${AWS::StackName}-src-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: expire-source-zips
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: build-and-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${AWS::StackName}*
              - Sid: EcrAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: EcrPublicAuth
                # Pull the base python image from AWS's ECR Public mirror instead of Docker Hub
                # (whose anonymous pull limit / HTTP 429 fails CodeBuild). GetAuthorizationToken for
                # ECR Public requires the sts service-bearer-token grant as well.
                Effect: Allow
                Action:
                  - ecr-public:GetAuthorizationToken
                  - sts:GetServiceBearerToken
                Resource: "*"
              - Sid: EcrPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource:
                  - !Ref WorkerRepoArn
                  - !Ref BackendRepoArn
                  - !Ref ReportRepoArn
              - Sid: SourceRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub ${SourceBucket.Arn}/*

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Ref AWS::StackName
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 30
      Source:
        Type: S3
        Location: !Sub ${SourceBucket}/source.zip
        BuildSpec: infra/g1/codebuild-images.yml
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true   # required to run the Docker daemon for image builds
        EnvironmentVariables:
          - Name: ECR_REGISTRY
            Value: !Ref EcrRegistry
          - Name: WORKER_REPO
            Value: !Ref WorkerRepoUri
          - Name: BACKEND_REPO
            Value: !Ref BackendRepoUri
          - Name: REPORT_REPO
            Value: !Ref ReportRepoUri
          - Name: IMAGE_TAG
            Value: !Ref ImageTag

Outputs:
  SourceBucketName:
    Value: !Ref SourceBucket
  ProjectName:
    Value: !Ref BuildProject
