AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  InterviewCoach G1 gate-enablement stack. Provisions ONLY the cloud resources the local
  measurement harness needs to produce a live SC-001 number: a Bedrock Agent (+ alias) for
  the AgentCore reply path, an RDS Postgres instance for the 3-table latency slice, a
  CloudWatch log group + response_gap dashboard, and a Secrets Manager secret for the
  Deepgram key. This is NOT the full Fargate/NLB production stack (that is task T048 and is
  premature until the STT/TTS/transport seams are wired).

  MANUAL PREREQUISITE (CloudFormation cannot do this): enable Claude model access in the
  Bedrock console (Model access) in this region BEFORE deploying, or the agent + harness
  invocations will fail with AccessDenied.

# ---------------------------------------------------------------------------------------
Parameters:
  ProjectTag:
    Type: String
    Default: interviewcoach-g1
    Description: Tag applied to all resources for cost tracking.

  FoundationModel:
    Type: String
    Default: us.anthropic.claude-sonnet-4-20250514-v1:0
    Description: >-
      Bedrock model or inference-profile ID the agent uses. Newer Claude (Sonnet 4.x) models
      require a cross-region INFERENCE PROFILE id (the "us." prefix), not the bare on-demand
      model id. Keep this aligned with BEDROCK_MODEL_ID in voice-worker/.env conceptually
      (the harness compares this agent against the direct-Bedrock model).

  AgentInstruction:
    Type: String
    Default: >-
      You are a friendly, professional job interviewer conducting a practice interview. Ask
      one clear, generic interview question or give a brief acknowledgement, then a follow-up
      question. Keep replies short and natural for speech. Be encouraging and
      confidence-building. Do not reference any resume or specific job; ask generic questions.
    Description: >-
      The agent system instruction. Mirrors SYSTEM_PROMPT in
      voice-worker/src/reply/interface.py. No PII / no personalization (Constitution III).

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the RDS instance (the default VPC is fine for a POC).

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      At least two subnets in different AZs for the DB subnet group. Use public subnets so the
      local harness (on your laptop) can reach the DB; the default VPC's subnets are public.

  HarnessIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >-
      CIDR allowed to reach Postgres (5432). DEFAULT IS OPEN for POC convenience — RESTRICT
      this to your own IP (e.g. 203.0.113.4/32) before deploying anything real.

  DBEngineVersion:
    Type: String
    Default: "16.4"
    Description: Postgres major.minor version. Adjust if not offered in your region.

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: Smallest sensible class for a POC measurement DB.

  DBName:
    Type: String
    Default: interviewcoach
    Description: Initial database name.

  DBMasterUsername:
    Type: String
    Default: icadmin
    Description: Master username. The password is generated and stored in Secrets Manager.

  DeepgramApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      Optional. If provided, stored in Secrets Manager for the eventual deployed worker. The
      LOCAL harness reads DEEPGRAM_API_KEY from voice-worker/.env, not from here.

# ---------------------------------------------------------------------------------------
Resources:

  # --- Bedrock Agent (the AgentCore reply path) -----------------------------------------
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Execution role assumed by the Bedrock agent to invoke the foundation model.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: invoke-foundation-model
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                # Broad for POC: covers on-demand model ARNs (all regions, for cross-region
                # inference profiles) and inference-profile ARNs in this account/region.
                Resource:
                  - arn:aws:bedrock:*::foundation-model/*
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*
      Tags:
        - Key: project
          Value: !Ref ProjectTag

  InterviewAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub ${AWS::StackName}-interview-coach
      Description: Generic G1 practice-interview coach (no personalization).
      FoundationModel: !Ref FoundationModel
      Instruction: !Ref AgentInstruction
      AgentResourceRoleArn: !GetAtt AgentExecutionRole.Arn
      AutoPrepare: true
      IdleSessionTTLInSeconds: 600
      Tags:
        project: !Ref ProjectTag

  InterviewAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt InterviewAgent.AgentId
      AgentAliasName: live
      Description: Stable alias the worker invokes (maps to AGENTCORE_AGENT_ALIAS_ID).
      Tags:
        project: !Ref ProjectTag

  # --- RDS Postgres (3-table latency slice) ---------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub ${AWS::StackName} G1 latency DB
      SubnetIds: !Ref SubnetIds
      Tags:
        - Key: project
          Value: !Ref ProjectTag

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AWS::StackName} Postgres access for the measurement harness
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref HarnessIngressCidr
          Description: Postgres from the harness (RESTRICT this CIDR)
      Tags:
        - Key: project
          Value: !Ref ProjectTag

  LatencyDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      EngineVersion: !Ref DBEngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      DBInstanceIdentifier: !Sub ${AWS::StackName}-latency
      DBName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      # RDS generates the master password and stores it in Secrets Manager (no plaintext here).
      # Auto-ROTATION IS DISABLED for this demo (post-create step — see infra/g1/README.md;
      # the rotation schedule lives on the RDS-owned `rds!db-*` secret, which this resource can't
      # address). The secret remains the durable home for the password; it just doesn't rotate.
      # Defense-in-depth: the services are ALSO rotation-proof in code — DB_SECRET_ARN + a
      # passwordless DSN make asyncpg fetch the live password from Secrets Manager per connection
      # (config._database_url + db_secret.make_password_provider) — so even if rotation is ever
      # re-enabled, a rotation stays transparent (no task restart). The two are independent: this
      # comment is why we don't NEED rotation handling, the code is the belt to that suspenders.
      ManageMasterUserPassword: true
      AllocatedStorage: "20"
      StorageType: gp3
      PubliclyAccessible: true
      MultiAZ: false
      BackupRetentionPeriod: 0
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      Tags:
        - Key: project
          Value: !Ref ProjectTag

  # --- Secrets (forward-looking; for the deployed worker) -------------------------------
  DeepgramSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/deepgram
      Description: Deepgram API key for the deployed voice worker (local harness uses .env).
      SecretString: !Sub '{"DEEPGRAM_API_KEY":"${DeepgramApiKey}"}'
      Tags:
        - Key: project
          Value: !Ref ProjectTag

  # --- Observability --------------------------------------------------------------------
  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub /interviewcoach/g1/${AWS::StackName}/voice-worker
      RetentionInDays: 14

  ResponseGapDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-response-gap
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "response_gap_ms p50 / p95 (SC-001 gate)",
                "region": "${AWS::Region}",
                "view": "timeSeries", "stacked": false,
                "metrics": [
                  [ "InterviewCoach/G1", "response_gap_ms", "reply_provider", "agentcore", { "stat": "p50", "label": "agentcore p50" } ],
                  [ "...", { "stat": "p95", "label": "agentcore p95" } ],
                  [ "InterviewCoach/G1", "response_gap_ms", "reply_provider", "bedrock_direct", { "stat": "p50", "label": "bedrock_direct p50" } ],
                  [ "...", { "stat": "p95", "label": "bedrock_direct p95" } ]
                ],
                "yAxis": { "left": { "min": 0, "label": "ms" } },
                "annotations": { "horizontal": [
                  { "label": "p50 PASS < 1000", "value": 1000 },
                  { "label": "hard gate p50 <= 1200", "value": 1200 },
                  { "label": "p95 PASS < 1500", "value": 1500 }
                ] }
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "response_gap breakdown p50 (agentcore)",
                "region": "${AWS::Region}",
                "view": "timeSeries", "stacked": true,
                "metrics": [
                  [ "InterviewCoach/G1", "stt_finalization_ms", "reply_provider", "agentcore", { "stat": "p50" } ],
                  [ "InterviewCoach/G1", "reply_ttft_ms", "reply_provider", "agentcore", { "stat": "p50" } ],
                  [ "InterviewCoach/G1", "tts_first_audio_ms", "reply_provider", "agentcore", { "stat": "p50" } ],
                  [ "InterviewCoach/G1", "orchestration_ms", "reply_provider", "agentcore", { "stat": "p50" } ]
                ],
                "yAxis": { "left": { "min": 0, "label": "ms" } }
              }
            }
          ]
        }

# ---------------------------------------------------------------------------------------
Outputs:
  AgentId:
    Description: Set this as AGENTCORE_AGENT_ID in voice-worker/.env
    Value: !GetAtt InterviewAgent.AgentId

  AgentAliasId:
    Description: Set this as AGENTCORE_AGENT_ALIAS_ID in voice-worker/.env
    Value: !GetAtt InterviewAgentAlias.AgentAliasId

  DBEndpoint:
    Description: RDS endpoint host (use in DATABASE_URL)
    Value: !GetAtt LatencyDB.Endpoint.Address

  DBPort:
    Description: RDS port
    Value: !GetAtt LatencyDB.Endpoint.Port

  DBMasterSecretArn:
    Description: >-
      Secrets Manager ARN holding the generated DB password. Build DATABASE_URL as
      postgres://<user>:<password>@<DBEndpoint>:<DBPort>/<DBName>
    Value: !GetAtt LatencyDB.MasterUserSecret.SecretArn

  DeepgramSecretArn:
    Description: Secrets Manager ARN for the Deepgram key (deployed worker only).
    Value: !Ref DeepgramSecret

  CloudWatchNamespace:
    Description: Matches CW_METRIC_NAMESPACE in voice-worker/.env
    Value: InterviewCoach/G1

  DashboardName:
    Description: CloudWatch dashboard for the live response_gap view
    Value: !Sub ${AWS::StackName}-response-gap
